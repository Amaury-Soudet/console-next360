/* ── SCORE MATURITÉ ── */
function computeMaturity({clientNom, volD, volDv, volC, profils, outils, etapesData, qualifData}) {
  // Signal 1 — Volumétrie connue
  const nbMetriques = [volD,volDv,volC].filter(v=>v>0).length;
  const s1 = nbMetriques===3?"green":nbMetriques>0?"orange":"red";

  // Signal 2 — Processus formalisé
  const etapesOk = ETAPES_DEF.filter(e=>{
    const sc=(etapesData[e.id]||{}).scenarios||[];
    return sc.length>0 && Math.abs(sc.reduce((a,s)=>a+(s.pct||0),0)-100)<1;
  }).length;
  const s2 = etapesOk>=3?"green":etapesOk>=1?"orange":"red";

  // Signal 3 — Coûts identifiés
  const hasProfil = profils.some(p=>p.cout>0);
  const hasOutil  = outils.some(o=>o.cout>0);
  const s3 = (hasProfil&&hasOutil)?"green":(hasProfil||hasOutil)?"orange":"red";

  // Signal 4 — Douleurs exprimées (tags OU observations)
  const allTags = ETAPES_DEF.flatMap(e=>(etapesData[e.id]||{}).signalTags||[]);
  const hasNotes = ETAPES_DEF.some(e=>(etapesData[e.id]||{}).note?.length>10);
  const s4 = allTags.length>0?"green":hasNotes?"orange":"red";

  const scores = [s1,s2,s3,s4];
  const greens = scores.filter(s=>s==="green").length;
  const level = greens===4?"Qualifié":greens>=3?"Structuré":greens>=1?"En cours":"Immature";
  const levelColor = greens===4?C.green:greens>=3?C.cyan:greens>=1?C.amber:C.red;
  return {scores, level, levelColor, greens};
}

/* ── HELPERS SCÉNARIOS ── */
const SCENARIO_DEF = () => ({label:"Cas nominal",temps:30,pct:100});
function tempsPondere(scenarios) {
  const total = scenarios.reduce((a,s)=>a+(s.pct||0),0);
  if(!total) return 0;
  return scenarios.reduce((a,s)=>a+(s.temps||0)*(s.pct||0),0)/total;
}

/* ── ETAPE BLOCK v5 ── */
function EtapeBlock({etape,data,onChange,allProfils,allOutils}) {
  const [open,setOpen] = useState(false);
  const [tab,setTab] = useState("scenarios"); // scenarios | ressources | conformite

  const DEF_SCENARIOS = [{label:"Cas nominal",temps:30,pct:70},{label:"Anomalie détectée",temps:60,pct:20},{label:"Contrôle inopiné",temps:90,pct:10}];
  const DEF_CONF = {active:false,taux:5,tempsBase:0,tempsSup:0,interlocuteurs:[],note:""};

  const d = data || {
    scenarios: DEF_SCENARIOS,
    tauxConversion:100, profils:[], outils:[], note:"", serviceNote:"",
    conformiteN1: {...DEF_CONF},
    conformiteN2: {...DEF_CONF, taux:1},
  };
  const upd = p => onChange({...d,...p});
  const updC = (lv,p) => upd({[`conformite${lv}`]:{...d[`conformite${lv}`],...p}});

  const scenarios = d.scenarios || DEF_SCENARIOS;
  const pa = d.profils||[]; const oa = d.outils||[];
  const hasAlert = d.note?.includes("!");
  const hasConfo = d.conformiteN1?.active || d.conformiteN2?.active;
  const tpMoyen = tempsPondere(scenarios);
  const totalPct = scenarios.reduce((a,s)=>a+(s.pct||0),0);
  const pctOk = Math.abs(totalPct-100)<1;

  // Scénario helpers
  const updScen = (i,p) => upd({scenarios: scenarios.map((s,idx)=>idx===i?{...s,...p}:s)});
  const addScen = () => upd({scenarios:[...scenarios,{label:"Nouveau cas",temps:30,pct:0}]});
  const delScen = i => upd({scenarios: scenarios.filter((_,idx)=>idx!==i)});

  const TABS = [["scenarios","⏱ Scénarios"],["ressources","👤 Ressources"],["conformite","⚠ Conformité"]];

  return (
    <div style={{border:`1px solid ${open?etape.color+"55":C.blackBorder}`,borderRadius:"10px",overflow:"hidden",marginBottom:"8px"}}>
      {/* Header accordéon */}
      <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",background:open?`${etape.color}08`:C.blackMid,cursor:"pointer",userSelect:"none"}}>
        <div style={{width:"34px",height:"34px",borderRadius:"8px",background:`${etape.color}20`,border:`1px solid ${etape.color}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",flexShrink:0}}>{etape.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:"13px",fontWeight:700,color:C.white,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em"}}>{etape.label}</div>
          <div style={{display:"flex",gap:"4px",marginTop:"3px",flexWrap:"wrap"}}>
            {pa.map(x=>{const p=allProfils.find(q=>q.id===x.id);return p?<Tag key={x.id} color={etape.color}>{p.label}</Tag>:null;})}
            {oa.map(oid=>{const o=allOutils.find(x=>x.id===oid);return o?<Tag key={oid} color={C.blue} bg={C.blueDim}>{o.nom}</Tag>:null;})}
            {hasConfo&&<Tag color={C.amber} bg={C.amberDim}>⚠ Conformité</Tag>}
            {!pa.length&&!oa.length&&!hasConfo&&<span style={{fontSize:"11px",color:C.whiteLight,fontStyle:"italic"}}>Aucune ressource assignée</span>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
          {tpMoyen>0&&<Tag color={C.cyan} bg={C.cyanDim}>⌀ {fmtH(tpMoyen/60)}</Tag>}
          {!pctOk&&scenarios.length>0&&<Tag color={C.amber} bg={C.amberDim}>Σ≠100%</Tag>}
          {d.tauxConversion<100&&<Tag color={etape.color}>{d.tauxConversion}%</Tag>}
          {hasAlert&&<span title="Point bloquant">⚠️</span>}
          <span style={{color:C.whiteLight,fontSize:"11px"}}>{open?"▲":"▼"}</span>
        </div>
      </div>

      {open && (
        <div style={{background:C.black,borderTop:`1px solid ${C.blackBorder}`}}>
          {/* Tabs */}
          <div style={{display:"flex",gap:"2px",padding:"10px 18px 0",borderBottom:`1px solid ${C.blackBorder}`}}>
            {TABS.map(([id,lbl])=>(
              <button key={id} onClick={()=>setTab(id)}
                style={{padding:"7px 16px",border:"none",borderBottom:tab===id?`2px solid ${etape.color}`:"2px solid transparent",background:"transparent",color:tab===id?etape.color:C.whiteMid,fontSize:"11px",fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em",transition:"all 0.15s",marginBottom:"-1px"}}>
                {lbl}
              </button>
            ))}
          </div>

          <div style={{padding:"18px"}}>

            {/* ── TAB SCÉNARIOS ── */}
            {tab==="scenarios" && (
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px"}}>
                  {/* Scénarios */}
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                      <Lbl style={{margin:0}}>Scénarios de traitement</Lbl>
                      <button onClick={addScen} style={{padding:"3px 10px",background:C.blackSurf,border:`1px solid ${C.blackBorder}`,borderRadius:"5px",color:C.cyan,fontSize:"11px",cursor:"pointer",fontWeight:700}}>+ Cas</button>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                      {scenarios.map((s,i)=>(
                        <div key={i} style={{padding:"10px 12px",background:C.blackSurf,borderRadius:"8px",border:`1px solid ${C.blackBorder}`}}>
                          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                            <input value={s.label} onChange={e=>updScen(i,{label:e.target.value})}
                              style={{flex:1,padding:"4px 8px",background:C.black,border:`1px solid ${C.blackBorder}`,borderRadius:"5px",fontSize:"12px",color:C.white,outline:"none",fontFamily:"'Barlow',sans-serif"}}/>
                            {scenarios.length>1&&<button onClick={()=>delScen(i)} style={{background:"none",border:"none",cursor:"pointer",color:C.whiteLight,fontSize:"14px",lineHeight:1,padding:"0 2px"}}>×</button>}
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                            <div>
                              <div style={{fontSize:"9px",color:C.whiteLight,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"3px"}}>Durée (min)</div>
                              <NInput value={s.temps} onChange={v=>updScen(i,{temps:v})} min={0} max={480} step={5}
                                style={{width:"100%",fontSize:"14px",fontWeight:700,color:etape.color}}/>
                            </div>
                            <div>
                              <div style={{fontSize:"9px",color:C.whiteLight,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"3px"}}>Fréquence (%)</div>
                              <NInput value={s.pct} onChange={v=>updScen(i,{pct:Math.min(100,Math.max(0,v))})} min={0} max={100} step={5}
                                style={{width:"100%",fontSize:"14px",fontWeight:700,color:pctOk?C.cyan:C.amber}}/>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div style={{marginTop:"8px",padding:"8px 12px",background:pctOk?C.cyanDim:C.amberDim,borderRadius:"7px",border:`1px solid ${pctOk?C.cyanBorder:C.amber+"40"}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:"11px",color:pctOk?C.cyan:C.amber}}>
                        {pctOk?"✓ Distribution valide":`⚠ Total : ${totalPct}% (doit faire 100%)`}
                      </span>
                      <span style={{fontSize:"13px",fontWeight:800,fontFamily:"'DM Mono',monospace",color:pctOk?C.cyan:C.amber}}>
                        ⌀ {fmtH(tpMoyen/60)}
                      </span>
                    </div>
                  </div>

                  {/* Droite : taux conversion + notes */}
                  <div>
                    <Lbl>Taux de transformation</Lbl>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                      <input type="range" min={0} max={100} step={1} value={d.tauxConversion??100} onChange={e=>upd({tauxConversion:Number(e.target.value)})} style={{flex:1,accentColor:etape.color,cursor:"pointer"}}/>
                      <input type="number" value={d.tauxConversion??100} min={0} max={100}
                        onChange={e=>upd({tauxConversion:Math.min(100,Math.max(0,Number(e.target.value)))})}
                        style={{width:"52px",padding:"4px 6px",border:`1px solid ${C.blackBorder}`,borderRadius:"5px",fontSize:"13px",fontFamily:"'DM Mono',monospace",color:etape.color,background:C.blackSurf,outline:"none",textAlign:"center",fontWeight:800}}/>
                      <span style={{fontSize:"12px",color:C.whiteLight}}>%</span>
                    </div>
                    {(d.tauxConversion??100)<100&&(
                      <div style={{padding:"6px 10px",background:C.amberDim,borderRadius:"6px",border:`1px solid ${C.amber}40`,fontSize:"11px",color:C.amber,marginBottom:"10px"}}>
                        ⚠ {100-(d.tauxConversion??100)}% de dossiers non convertis à cette étape
                      </div>
                    )}
                    <Lbl style={{marginTop:"10px"}}>Observations</Lbl>
                    <textarea value={d.note||""} onChange={e=>upd({note:e.target.value})}
                      placeholder={"Points de friction… (ajoutez '!' pour marquer un point bloquant)"} rows={4}
                      style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.blackBorder}`,borderRadius:"6px",fontSize:"12px",color:C.white,background:C.blackSurf,lineHeight:1.6,resize:"vertical",fontFamily:"'Barlow',sans-serif"}}/>
                    <Lbl style={{marginTop:"10px"}}>Signaux commerciaux</Lbl>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                      {SIGNAL_TAGS.map(t=>{
                        const active=(d.signalTags||[]).includes(t.id);
                        return (
                          <button key={t.id} onClick={()=>{
                            const cur=d.signalTags||[];
                            upd({signalTags:active?cur.filter(x=>x!==t.id):[...cur,t.id]});
                          }} style={{display:"flex",alignItems:"center",gap:"5px",padding:"5px 10px",borderRadius:"5px",border:`1px solid ${active?t.color:C.blackBorder}`,background:active?t.bg:C.blackSurf,color:active?t.color:C.whiteMid,fontSize:"11px",fontWeight:active?700:400,cursor:"pointer",transition:"all 0.15s",fontFamily:"'Barlow',sans-serif"}}>
                            <span>{t.icon}</span>{t.label}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── TAB RESSOURCES ── */}
            {tab==="ressources" && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px"}}>
                {/* Interlocuteurs */}
                <div>
                  <Lbl>Interlocuteurs assignés</Lbl>
                  <select onChange={e=>{const pid=e.target.value;if(pid&&!pa.find(p=>p.id===pid)){upd({profils:[...pa,{id:pid,pctTemps:100}]});}e.target.value="";}}
                    style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.blackBorder}`,borderRadius:"6px",fontSize:"12px",background:C.blackSurf,color:C.white,marginBottom:"10px"}}>
                    <option value="">+ Assigner un profil…</option>
                    {allProfils.map(p=><option key={p.id} value={p.id}>{p.label} — {p.service||"—"}</option>)}
                  </select>
                  {!pa.length&&<p style={{fontSize:"12px",color:C.whiteLight,fontStyle:"italic"}}>Aucun profil assigné</p>}
                  {pa.map(x=>{
                    const p=allProfils.find(q=>q.id===x.id);if(!p)return null;
                    const chargeH = tpMoyen/60 * (x.pctTemps/100);
                    const capJour = 8*(p.pctMarche/100)*(Math.max(0,p.disponibilite-p.fragmentation)/100);
                    return (
                      <div key={x.id} style={{padding:"10px 12px",background:C.blackSurf,borderRadius:"8px",border:`1px solid ${C.blackBorder}`,marginBottom:"8px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
                          <div>
                            <div style={{fontSize:"12px",fontWeight:700,color:C.white}}>{p.label}</div>
                            <div style={{fontSize:"10px",color:C.whiteLight}}>{p.service||"—"} · {NIVEAUX[p.niveau]}</div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                            <Tag color={etape.color} bg={`${etape.color}15`}>{fmtH(chargeH)}/dossier</Tag>
                            <button onClick={()=>upd({profils:pa.filter(q=>q.id!==x.id)})} style={{background:"none",border:"none",cursor:"pointer",color:C.whiteLight,fontSize:"16px",lineHeight:1}}>×</button>
                          </div>
                        </div>
                        <PctCtrl value={x.pctTemps} onChange={v=>upd({profils:pa.map(q=>q.id===x.id?{...q,pctTemps:v}:q)})} color={etape.color} label="% du temps de l'étape"/>
                      </div>
                    );
                  })}
                  <div style={{marginTop:"8px"}}>
                    <Lbl>Service / département</Lbl>
                    <TInput value={d.serviceNote||""} onChange={v=>upd({serviceNote:v})} placeholder="Ex : Direction Achats, DSI…"/>
                  </div>
                </div>
                {/* Outils */}
                <div>
                  <Lbl>Outils utilisés</Lbl>
                  <select onChange={e=>{const oid=e.target.value;if(oid&&!oa.includes(oid)){upd({outils:[...oa,oid]});}e.target.value="";}}
                    style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.blackBorder}`,borderRadius:"6px",fontSize:"12px",background:C.blackSurf,color:C.white,marginBottom:"10px"}}>
                    <option value="">+ Ajouter un outil…</option>
                    {allOutils.map(o=><option key={o.id} value={o.id}>{o.nom}</option>)}
                  </select>
                  {!oa.length&&<p style={{fontSize:"12px",color:C.whiteLight,fontStyle:"italic"}}>Aucun outil affecté</p>}
                  <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                    {oa.map(oid=>{const o=allOutils.find(x=>x.id===oid);return o?(
                      <span key={oid} style={{display:"inline-flex",alignItems:"center",gap:"4px",padding:"4px 10px",borderRadius:"5px",fontSize:"11px",color:C.blueLight,background:C.blueDim,border:`1px solid ${C.blueBorder}`,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:"0.03em"}}>
                        {o.nom}<button onClick={()=>upd({outils:oa.filter(x=>x!==oid)})} style={{background:"none",border:"none",cursor:"pointer",color:C.blueLight,fontSize:"13px",lineHeight:1,padding:0,marginLeft:"3px"}}>×</button>
                      </span>
                    ):null;})}
                  </div>
                </div>
              </div>
            )}

            {/* ── TAB CONFORMITÉ ── */}
            {tab==="conformite" && (
              <div>
                <div style={{marginBottom:"12px",padding:"10px 14px",background:C.blackSurf,borderRadius:"8px",border:`1px solid ${C.blackBorder}`,fontSize:"12px",color:C.whiteMid,lineHeight:1.6}}>
                  Définissez la fréquence de déclenchement de chaque contrôle. Le temps moyen pondéré de l'étape intégrera automatiquement ces contrôles proportionnellement à leur taux.
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
                  {["N1","N2"].map(lv=>{
                    const cf = d[`conformite${lv}`]||{...DEF_CONF,taux:lv==="N1"?5:1};
                    const isN2 = lv==="N2";
                    return (
                      <div key={lv} style={{border:`1px solid ${cf.active?C.amber+"66":C.blackBorder}`,borderRadius:"10px",overflow:"hidden"}}>
                        {/* Toggle header */}
                        <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",background:cf.active?C.amberDim:C.blackSurf,cursor:"pointer"}} onClick={()=>updC(lv,{active:!cf.active})}>
                          <div style={{width:"20px",height:"20px",borderRadius:"5px",border:`2px solid ${cf.active?C.amber:C.blackBorder}`,background:cf.active?C.amber:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
                            {cf.active&&<span style={{color:C.black,fontSize:"11px",fontWeight:900}}>✓</span>}
                          </div>
                          <div style={{flex:1}}>
                            <div style={{fontSize:"12px",fontWeight:700,color:cf.active?C.amber:C.whiteMid,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.05em"}}>CONTRÔLE {lv} — {isN2?"Approfondi":"Standard"}</div>
                            {cf.active&&<div style={{fontSize:"10px",color:C.amber,marginTop:"1px"}}>{cf.taux}% des dossiers · +{fmtH(cf.tempsBase/60)} par déclenchement</div>}
                          </div>
                        </div>
                        {cf.active&&(
                          <div style={{padding:"14px",background:C.black,display:"flex",flexDirection:"column",gap:"10px"}}>
                            {/* Taux déclenchement */}
                            <div style={{padding:"10px 12px",background:C.amberDim,borderRadius:"7px",border:`1px solid ${C.amber}40`}}>
                              <div style={{fontSize:"9px",color:C.amber,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"6px",fontWeight:700}}>Taux de déclenchement</div>
                              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                                <input type="range" min={0} max={100} step={1} value={cf.taux||0} onChange={e=>updC(lv,{taux:Number(e.target.value)})} style={{flex:1,accentColor:C.amber,cursor:"pointer"}}/>
                                <input type="number" value={cf.taux||0} min={0} max={100} onChange={e=>updC(lv,{taux:Math.min(100,Math.max(0,Number(e.target.value)))})}
                                  style={{width:"52px",padding:"4px 6px",border:`1px solid ${C.amber}40`,borderRadius:"5px",fontSize:"13px",fontFamily:"'DM Mono',monospace",color:C.amber,background:C.black,outline:"none",textAlign:"center",fontWeight:800}}/>
                                <span style={{fontSize:"11px",color:C.amber}}>%</span>
                              </div>
                              <div style={{fontSize:"10px",color:C.amber,marginTop:"5px",opacity:0.8}}>
                                = {cf.taux||0} dossier{(cf.taux||0)>1?"s":"s"} sur 100 déclenchent ce contrôle
                              </div>
                            </div>
                            {/* Temps */}
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                              {[["Durée base (min)",(cf.tempsBase||0),v=>updC(lv,{tempsBase:v})],["Durée max (min)",(cf.tempsSup||0),v=>updC(lv,{tempsSup:v})]].map(([lbl,val,setter])=>(
                                <div key={lbl}>
                                  <div style={{fontSize:"9px",color:C.whiteLight,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"4px"}}>{lbl}</div>
                                  <NInput value={val} onChange={setter} min={0} max={480} step={5} style={{width:"100%"}}/>
                                </div>
                              ))}
                            </div>
                            {/* Interlocuteurs */}
                            <div>
                              <Lbl>Interlocuteurs conformité</Lbl>
                              <select onChange={e=>{const pid=e.target.value;if(pid&&!cf.interlocuteurs.includes(pid)){updC(lv,{interlocuteurs:[...cf.interlocuteurs,pid]});}e.target.value="";}}
                                style={{width:"100%",padding:"6px 8px",border:`1px solid ${C.blackBorder}`,borderRadius:"6px",fontSize:"11px",background:C.blackSurf,color:C.white,marginBottom:"6px"}}>
                                <option value="">+ Assigner…</option>
                                {allProfils.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
                              </select>
                              <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                                {(cf.interlocuteurs||[]).map(pid=>{const p=allProfils.find(x=>x.id===pid);return p?(
                                  <span key={pid} style={{display:"inline-flex",alignItems:"center",gap:"3px",padding:"2px 8px",background:C.amberDim,border:`1px solid ${C.amber}40`,borderRadius:"4px",fontSize:"10px",color:C.amber,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>
                                    {p.label}<button onClick={()=>updC(lv,{interlocuteurs:cf.interlocuteurs.filter(x=>x!==pid)})} style={{background:"none",border:"none",cursor:"pointer",color:C.amber,fontSize:"12px",lineHeight:1,padding:0}}>×</button>
                                  </span>
                                ):null;})}
                              </div>
                            </div>
                            {/* Notes */}
                            <textarea value={cf.note||""} onChange={e=>updC(lv,{note:e.target.value})} placeholder={`Notes contrôle ${lv}…`} rows={2}
                              style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.blackBorder}`,borderRadius:"6px",fontSize:"11px",color:C.white,background:C.blackSurf,lineHeight:1.5,resize:"vertical",fontFamily:"'Barlow',sans-serif"}}/>
                            {/* Impact calculé */}
                            <div style={{padding:"7px 10px",background:C.amberDim,borderRadius:"6px",border:`1px solid ${C.amber}40`,fontSize:"11px",color:C.amber,display:"flex",justifyContent:"space-between"}}>
                              <span>Impact sur temps moyen de l'étape</span>
                              <strong>+{fmtH((cf.tempsBase||0)*(cf.taux||0)/100/60)}</strong>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

          </div>
        </div>
      )}
    </div>
  );
}

/* ── QUALIFICATION OPTIONNELLE ── */
function QualifBlock({data, onChange, allProfils, allOutils}) {
  const [open,setOpen] = useState(false);
  const d = data || {active:false, taux:30, scenarios:[{label:"Standard",temps:60,pct:70},{label:"Complexe",temps:90,pct:30}], profils:[], outils:[], note:""};
  const upd = p => onChange({...d,...p});
  const scenarios = d.scenarios||[];
  const tpMoyen = tempsPondere(scenarios);
  const totalPct = scenarios.reduce((a,s)=>a+(s.pct||0),0);
  const pctOk = Math.abs(totalPct-100)<1;
  const updScen = (i,p) => upd({scenarios:scenarios.map((s,idx)=>idx===i?{...s,...p}:s)});

  return (
    <div style={{border:`2px dashed ${d.active?C.blueLight+"66":C.blackBorder}`,borderRadius:"10px",overflow:"hidden",marginBottom:"8px"}}>
      <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",background:d.active?C.blueDim:C.blackMid,cursor:"pointer",userSelect:"none"}}>
        <div style={{width:"34px",height:"34px",borderRadius:"8px",background:d.active?C.blueDim:`${C.blackBorder}`,border:`1px solid ${d.active?C.blueLight:C.blackBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",flexShrink:0}}>🔍</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"13px",fontWeight:700,color:d.active?C.blueLight:C.whiteMid,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em"}}>QUALIFICATION COMPLÉMENTAIRE</span>
            <Tag color={C.blue} bg={C.blueDim}>Optionnelle</Tag>
            {d.active&&<Tag color={C.blueLight} bg={C.blueDim}>{d.taux}% des demandes</Tag>}
          </div>
          <div style={{fontSize:"11px",color:C.whiteLight,marginTop:"2px"}}>Sous-étape conditionnelle rattachée à l'expression du besoin</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
          {/* Toggle actif */}
          <div onClick={e=>{e.stopPropagation();upd({active:!d.active});}}
            style={{width:"36px",height:"20px",borderRadius:"10px",background:d.active?C.blueLight:C.blackBorder,position:"relative",cursor:"pointer",transition:"background 0.2s",flexShrink:0}}>
            <div style={{position:"absolute",top:"2px",left:d.active?"18px":"2px",width:"16px",height:"16px",borderRadius:"50%",background:"white",transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}/>
          </div>
          {d.active&&tpMoyen>0&&<Tag color={C.blueLight} bg={C.blueDim}>⌀ {fmtH(tpMoyen/60)}</Tag>}
          <span style={{color:C.whiteLight,fontSize:"11px"}}>{open?"▲":"▼"}</span>
        </div>
      </div>

      {open && d.active && (
        <div style={{padding:"18px",background:C.black,borderTop:`1px solid ${C.blackBorder}`}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px"}}>
            <div>
              {/* Taux déclenchement */}

                  <input type="number" value={d.taux||0} min={0} max={100}

                </div>
                <div style={{fontSize:"10px",color:C.blueLight,marginTop:"5px",opacity:0.8}}>= {d.taux||0} demandes sur 100 nécessitent une qualification complémentaire</div>

              {scenarios.map((s,i)=>(

                    style={{width:"100%",padding:"4px 8px",background:C.black,border:`1px solid ${C.blackBorder}`,borderRadius:"5px",fontSize:"12px",color:C.white,outline:"none",fontFamily:"'Barlow',sans-serif",marginBottom:"7px"}}/>

                      <NInput value={s.pct} onChange={v=>updScen(i,{pct:v})} min={0} max={100} style={{width:"100%",color:pctOk?C.blueLight:C.amber}}/>
                    </div>

            <div>
              <Lbl>Profils assignés</Lbl>
              <select onChange={e=>{const pid=e.target.value;if(pid&&!(d.profils||[]).find(p=>p.id===pid)){upd({profils:[...(d.profils||[]),{id:pid,pctTemps:100}]});}e.target.value="";}}
                style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.blackBorder}`,borderRadius:"6px",fontSize:"12px",background:C.blackSurf,color:C.white,marginBottom:"8px"}}>
                <option value="">+ Assigner…</option>
                {allProfils.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}

              <div style={{marginTop:"10px"}}>
                <Lbl>Outils utilisés</Lbl>

                </select>
                <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                  {(d.outils||[]).map(oid=>{const o=allOutils.find(x=>x.id===oid);return o?(
                    <span key={oid} style={{display:"inline-flex",alignItems:"center",gap:"4px",padding:"3px 9px",borderRadius:"4px",fontSize:"11px",color:C.blueLight,background:C.blueDim,border:`1px solid ${C.blueBorder}`,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>
                      {o.nom}<button onClick={()=>upd({outils:(d.outils||[]).filter(x=>x!==oid)})} style={{background:"none",border:"none",cursor:"pointer",color:C.blueLight,fontSize:"13px",lineHeight:1,padding:0,marginLeft:"2px"}}>×</button>
                    </span>

                </div>
              </div>
              <div style={{marginTop:"10px"}}>
                <Lbl>Observations</Lbl>
                <textarea value={d.note||""} onChange={e=>upd({note:e.target.value})} placeholder="Notes sur cette qualification…" rows={3}
                  style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.blackBorder}`,borderRadius:"6px",fontSize:"12px",color:C.white,background:C.blackSurf,lineHeight:1.6,resize:"vertical",fontFamily:"'Barlow',sans-serif"}}/>
              </div>
            </div>
          </div>
        </div>
      )}
      {open && !d.active && (
        <div style={{padding:"18px",background:C.black,borderTop:`1px solid ${C.blackBorder}`,textAlign:"center",color:C.whiteLight,fontSize:"13px"}}>
          Activez la qualification complémentaire pour configurer les scénarios et les ressources associées.
        </div>
      )}
    </div>
  );
}

/* ── SWIMLANE ── */
function Swimlane({etapesData,allProfils,allOutils}) {
  const ruptures = useMemo(()=>{
    const map={};
    ETAPES_DEF.forEach(e=>{
      const d=etapesData[e.id]||{};
      (d.outils||[]).forEach(oid=>{const o=allOutils.find(x=>x.id===oid);if(o){if(!map[o.nom])map[o.nom]=[];map[o.nom].push(e.id);}});
    });
    return Object.entries(map).filter(([,et])=>et.length>1).map(([nom,etapes])=>({nom,etapes}));
  },[etapesData,allOutils]);

  const cellW=138, labelW=150;

  if(!allProfils.length) return (
    <div style={{padding:"28px",textAlign:"center",color:C.whiteLight,fontSize:"13px",fontStyle:"italic"}}>Ajoutez des profils et assignez-les aux étapes pour générer le swimlane.</div>
  );

  return (
    <div>
      <div style={{overflowX:"auto",borderRadius:"8px",border:`1px solid ${C.blackBorder}`}}>
        <div style={{minWidth:`${labelW+ETAPES_DEF.length*cellW}px`}}>
          {/* Header */}
          <div style={{display:"flex",background:C.blackSurf,borderBottom:`1px solid ${C.blackBorder}`}}>
            <div style={{width:`${labelW}px`,flexShrink:0,padding:"10px 14px",borderRight:`1px solid ${C.blackBorder}`}}>
              <span style={{fontSize:"9px",fontWeight:700,color:C.whiteLight,textTransform:"uppercase",letterSpacing:"0.09em"}}>Profil / Service</span>
            </div>
            {ETAPES_DEF.map(e=>(
              <div key={e.id} style={{width:`${cellW}px`,flexShrink:0,padding:"10px 8px",borderRight:`1px solid ${C.blackBorder}`,textAlign:"center"}}>
                <div style={{fontSize:"15px",marginBottom:"3px"}}>{e.icon}</div>
                <div style={{fontSize:"9px",fontWeight:800,color:e.color,textTransform:"uppercase",letterSpacing:"0.04em",lineHeight:1.3,fontFamily:"'Barlow Condensed',sans-serif"}}>{e.shortLabel}</div>
              </div>
            ))}
          </div>
          {/* Rows */}
          {allProfils.map((profil,ri)=>(
            <div key={profil.id} style={{display:"flex",borderBottom:`1px solid ${C.blackBorder}`,background:ri%2===0?C.black:C.blackMid}}>
              <div style={{width:`${labelW}px`,flexShrink:0,padding:"10px 14px",borderRight:`1px solid ${C.blackBorder}`,display:"flex",flexDirection:"column",justifyContent:"center",gap:"3px"}}>
                <div style={{fontSize:"12px",fontWeight:700,color:C.white,fontFamily:"'Barlow',sans-serif"}}>{profil.label}</div>
                <div style={{fontSize:"10px",color:C.whiteLight}}>{profil.service||"—"}</div>
                <Tag color={profil.niveau===0?C.cyan:profil.niveau===1?C.blueLight:C.amber} size={9}>{NIVEAUX[profil.niveau]}</Tag>
              </div>
              {ETAPES_DEF.map(etape=>{
                const d=etapesData[etape.id]||{};
                const assigned=(d.profils||[]).find(pa=>pa.id===profil.id);
                const outils=(d.outils||[]).map(oid=>allOutils.find(o=>o.id===oid)).filter(Boolean);
                return (
                  <div key={etape.id} style={{width:`${cellW}px`,flexShrink:0,padding:"8px",borderRight:`1px solid ${C.blackBorder}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"3px"}}>
                    {assigned?(
                      <>
                        <div style={{width:"26px",height:"26px",borderRadius:"50%",background:`${etape.color}25`,border:`2px solid ${etape.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px"}}>{etape.icon}</div>
                        <div style={{fontSize:"10px",fontWeight:700,color:etape.color,fontFamily:"'DM Mono',monospace"}}>{assigned.pctTemps}%</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:"2px",justifyContent:"center"}}>
                          {outils.slice(0,2).map(o=><span key={o.id} style={{fontSize:"8px",padding:"1px 4px",background:C.blueDim,color:C.blueLight,borderRadius:"2px",fontFamily:"'DM Mono',monospace",fontWeight:700}}>{o.nom}</span>)}
                          {outils.length>2&&<span style={{fontSize:"8px",color:C.whiteLight}}>+{outils.length-2}</span>}
                        </div>
                      </>
                    ):(
                      <div style={{width:"8px",height:"8px",borderRadius:"50%",background:C.blackBorder}}/>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {/* Ruptures */}
      {ruptures.length>0&&(
        <div style={{marginTop:"14px"}}>
          <Lbl style={{color:C.amber}}>Connexions & ruptures d'outils détectées</Lbl>
          <div style={{display:"flex",flexDirection:"column",gap:"7px",marginTop:"8px"}}>
            {ruptures.map(r=>{
              const frag=r.etapes.length>2;
              return (
                <div key={r.nom} style={{padding:"10px 14px",background:frag?C.amberDim:C.blueDim,border:`1px solid ${frag?C.amber+"50":C.blueBorder}`,borderRadius:"7px",display:"flex",alignItems:"center",gap:"12px"}}>
                  <span style={{fontSize:"16px"}}>{frag?"⚠️":"🔗"}</span>
                  <div style={{flex:1}}>
                    <span style={{fontSize:"12px",fontWeight:800,color:frag?C.amber:C.blueLight,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.03em"}}>{r.nom}</span>
                    <div style={{display:"flex",alignItems:"center",gap:"4px",marginTop:"4px",flexWrap:"wrap"}}>
                      {r.etapes.map((eid,i)=>{const e=ETAPES_DEF.find(x=>x.id===eid);return(<span key={eid} style={{display:"flex",alignItems:"center",gap:"3px"}}><Tag color={e?.color||C.white} size={9}>{e?.shortLabel||eid}</Tag>{i<r.etapes.length-1&&<span style={{color:C.whiteLight,fontSize:"10px"}}>→</span>}</span>);})}
                    </div>
                  </div>
                  {frag&&<div style={{fontSize:"11px",color:C.amber,maxWidth:"160px",lineHeight:1.4,textAlign:"right"}}>Usage fragmenté — signal de centralisation</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── EXPORT PDF (jsPDF programmatique) ── */
let _jspdfLoaded = false;
function loadJsPDF() {
  return new Promise((resolve, reject) => {
    if (window.jspdf) { resolve(window.jspdf.jsPDF); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload = () => resolve(window.jspdf.jsPDF);
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function exportPDF({ clientNom, clientSecteur, clientContact, calc, volD, volDv, volC, txDD, txDC, etapesData, notes }) {
  const JsPDF = await loadJsPDF();
  const doc = new JsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  const W = 210, M = 14;
  const CW = W - M * 2;
  let y = M;

  const CYAN = [0, 200, 215];
  const BLUE = [47, 95, 152];
  const WHITE = [232, 238, 245];
  const DARK = [26, 32, 48];
  const MID = [122, 138, 154];
  const AMBER = [240, 160, 32];
  const GREEN = [0, 200, 150];
  const RED = [239, 68, 68];

  // fond page
  doc.setFillColor(9, 13, 18);
  doc.rect(0, 0, W, 297, "F");

  // ── barre header
  doc.setFillColor(...DARK);
  doc.rect(0, 0, W, 22, "F");
  doc.setDrawColor(...CYAN);
  doc.setLineWidth(0.5);
  doc.line(0, 22, W, 22);

  doc.setFont("helvetica", "bold");
  doc.setFontSize(7);
  doc.setTextColor(...MID);
  doc.text("SMLB · NEXT360 — QUALIFICATION PROSPECT", M, 8);

  doc.setFontSize(13);
  doc.setTextColor(...WHITE);
  doc.text(clientNom || "Prospect", M, 16);

  doc.setFontSize(7);
  doc.setTextColor(...MID);
  doc.setFont("helvetica", "normal");
  const dateStr = new Date().toLocaleDateString("fr-FR");
  doc.text(dateStr, W - M, 16, { align: "right" });
  if (clientSecteur) doc.text(`${clientSecteur}${clientContact ? " · " + clientContact : ""}`, M, 20);

  y = 28;

  // ── ligne cyan séparatrice
  doc.setDrawColor(...CYAN);
  doc.setLineWidth(0.4);
  doc.line(M, y, W - M, y);
  y += 4;

  // ── KPIs 5 colonnes
  const kpis = [
    ["ETP mobilisés", String(calc.etpTotal), CYAN],
    ["Coût RH / mois", fmtEuro(calc.coutRH), [74, 130, 196]],
    ["Budget outils / mois", fmtEuro(calc.coutOutils), BLUE],
    ["Coût total / mois", fmtEuro(calc.coutTotal), CYAN],
    ["Coût / dossier", fmtEuro(calc.coutPD), AMBER],
  ];
  const kW = CW / kpis.length;
  kpis.forEach(([label, value, color], i) => {
    const x = M + i * kW;
    doc.setFillColor(...DARK);
    doc.roundedRect(x, y, kW - 2, 16, 2, 2, "F");
    doc.setDrawColor(...color);
    doc.setLineWidth(0.4);
    doc.line(x, y, x + kW - 2, y);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(6);
    doc.setTextColor(...MID);
    doc.text(label.toUpperCase(), x + (kW - 2) / 2, y + 5, { align: "center" });
    doc.setFontSize(9);
    doc.setTextColor(...color);
    doc.text(value, x + (kW - 2) / 2, y + 12, { align: "center" });
  });
  y += 20;

  // ── Funnel + Charge (2 colonnes)
  const colW = (CW - 4) / 2;

  // Funnel
  doc.setFillColor(...DARK);
  doc.roundedRect(M, y, colW, 38, 2, 2, "F");
  doc.setFont("helvetica", "bold");
  doc.setFontSize(6);
  doc.setTextColor(...MID);
  doc.text("FUNNEL DE TRANSFORMATION", M + 4, y + 6);
  const funnelRows = [
    ["Demandes", fmtN(volD), "100%", CYAN],
    ["Devis émis", fmtN(volDv), `${txDD}%`, [74, 130, 196]],
    ["Commandes", fmtN(volC), `${txDC}%`, GREEN],
  ];
  funnelRows.forEach(([lbl, val, pct, c], i) => {
    const fy = y + 12 + i * 8;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.setTextColor(...MID);
    doc.text(lbl, M + 4, fy);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(...c);
    doc.text(val, M + colW - 16, fy, { align: "right" });
    doc.setFontSize(6);
    doc.setTextColor(...c);
    doc.text(pct, M + colW - 4, fy, { align: "right" });
    // barre
    doc.setFillColor(36, 45, 58);
    doc.roundedRect(M + 4, fy + 1, colW - 10, 2, 1, 1, "F");
    const barW = Math.max(1, (parseInt(pct) / 100) * (colW - 10));
    doc.setFillColor(...c);
    doc.roundedRect(M + 4, fy + 1, barW, 2, 1, 1, "F");
  });

  // Charge
  const cx = M + colW + 4;
  doc.setFillColor(...DARK);
  doc.roundedRect(cx, y, colW, 38, 2, 2, "F");
  doc.setFont("helvetica", "bold");
  doc.setFontSize(6);
  doc.setTextColor(...MID);
  doc.text("CHARGE & CAPACITÉ", cx + 4, y + 6);
  [["Charge mensuelle", fmtH(calc.chargeH), CYAN], ["Capacité effective", fmtH(calc.capH), MID]].forEach(([lbl, val, c], i) => {
    const ry = y + 13 + i * 8;
    doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.setTextColor(...MID); doc.text(lbl, cx + 4, ry);
    doc.setFont("helvetica", "bold"); doc.setTextColor(...c); doc.text(val, cx + colW - 4, ry, { align: "right" });
  });
  // jauge taux de charge
  const tauxColor = calc.tauxC > 90 ? RED : calc.tauxC > 70 ? AMBER : GREEN;
  doc.setFillColor(36, 45, 58);
  doc.roundedRect(cx + 4, y + 30, colW - 8, 3, 1, 1, "F");
  doc.setFillColor(...tauxColor);
  doc.roundedRect(cx + 4, y + 30, Math.min(colW - 8, (calc.tauxC / 100) * (colW - 8)), 3, 1, 1, "F");
  doc.setFont("helvetica", "bold"); doc.setFontSize(7); doc.setTextColor(...tauxColor);
  doc.text(`Taux de charge : ${calc.tauxC.toFixed(0)}%`, cx + colW - 4, y + 37, { align: "right" });

  y += 42;

  // ── Points bloquants
  const bloquants = ETAPES_DEF.filter(e => etapesData[e.id]?.note?.includes("!"));
  if (bloquants.length > 0) {
    doc.setFillColor(60, 40, 10);
    const bh = 10 + bloquants.length * 7;
    doc.roundedRect(M, y, CW, bh, 2, 2, "F");
    doc.setFont("helvetica", "bold"); doc.setFontSize(6); doc.setTextColor(...AMBER);
    doc.text("POINTS BLOQUANTS IDENTIFIÉS", M + 4, y + 5);
    bloquants.forEach((e, i) => {
      doc.setFont("helvetica", "bold"); doc.setFontSize(7); doc.setTextColor(...WHITE);
      doc.text(`${e.shortLabel} :`, M + 4, y + 11 + i * 7);
      doc.setFont("helvetica", "normal"); doc.setTextColor(...MID);
      const note = etapesData[e.id].note.substring(0, 90);
      doc.text(note, M + 28, y + 11 + i * 7);
    });
    y += bh + 4;
  }

  // ── Profils mobilisés
  doc.setFillColor(...DARK);
  const etapesActives = ETAPES_DEF.filter(e => {
    const d = etapesData[e.id] || {};
    return (d.profils || []).length > 0 || (d.tempsBase || 0) > 0;
  });
  if (etapesActives.length > 0) {
    doc.setFont("helvetica", "bold"); doc.setFontSize(6); doc.setTextColor(...MID);
    doc.text("WORKFLOW — TEMPS PAR ÉTAPE", M, y + 4);
    y += 7;
    const eW = CW / Math.min(etapesActives.length, 6);
    etapesActives.slice(0, 6).forEach((e, i) => {
      const d = etapesData[e.id] || {};
      const t = (d.tempsBase || 0) + (d.tempsSup || 0);
      const ex = M + i * eW;
      doc.setFillColor(...DARK);
      doc.roundedRect(ex, y, eW - 2, 14, 1, 1, "F");
      doc.setFont("helvetica", "bold"); doc.setFontSize(6);
      doc.setTextColor(0, 200, 215);
      doc.text(e.shortLabel, ex + (eW - 2) / 2, y + 5, { align: "center" });
      doc.setFontSize(8); doc.setTextColor(...WHITE);
      doc.text(t > 0 ? fmtH(t / 60) : "—", ex + (eW - 2) / 2, y + 11, { align: "center" });
    });
    y += 18;
  }

  // ── Notes
  if (notes.general || notes.postrdv) {
    [["NOTES DE RÉUNION", notes.general], ["ACTIONS POST-RDV", notes.postrdv]].forEach(([title, content]) => {
      if (!content) return;
      const lines = doc.splitTextToSize(content, colW - 8);
      const nh = 10 + lines.length * 4.5;
      doc.setFillColor(...DARK);
      doc.roundedRect(M, y, CW, nh, 2, 2, "F");
      doc.setFont("helvetica", "bold"); doc.setFontSize(6); doc.setTextColor(...MID);
      doc.text(title, M + 4, y + 5);
      doc.setFont("helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(...MID);
      doc.text(lines, M + 4, y + 10);
      y += nh + 4;
    });
  }

  // ── Footer NEXT360
  doc.setFillColor(0, 200, 215, 20);
  doc.setDrawColor(...CYAN);
  doc.setLineWidth(0.3);
  doc.roundedRect(M, y, CW, 12, 2, 2, "D");
  doc.setFont("helvetica", "bold"); doc.setFontSize(7); doc.setTextColor(...CYAN);
  doc.text("PROJECTION NEXT360 · À compléter avec les métriques SMLB", W / 2, y + 5, { align: "center" });
  doc.setFont("helvetica", "normal"); doc.setFontSize(6); doc.setTextColor(...MID);
  doc.text("Comparaison situation actuelle vs NEXT360 — calcul des économies envisageables et ROI d'adoption", W / 2, y + 10, { align: "center" });

  // ── pied de page

/* ── DOSSIER SERIALIZATION ── */
const SCHEMA_VERSION = "1.0";

function exportJSON(state) {
  const payload = { _version: SCHEMA_VERSION, _exportedAt: new Date().toISOString(), ...state };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const nom = (state.clientNom || "Prospect").replace(/\s+/g, "_");
  const date = new Date().toLocaleDateString("fr-FR").replace(/\//g, "-");
  a.href = url;
  a.download = `NEXT360_${nom}_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function readJSONFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => { try { resolve(JSON.parse(e.target.result)); } catch { reject(new Error("Fichier JSON invalide")); } };
    reader.onerror = () => reject(new Error("Erreur de lecture"));
    reader.readAsText(file);
  });
}

                  });
                  const tagCounts = SIGNAL_TAGS.map(t=>({...t,count:allTags.filter(x=>x.tag===t.id).length})).filter(t=>t.count>0);
                  const dominant = tagCounts.sort((a,b)=>b.count-a.count)[0];
                  const etapesChargees = ETAPES_DEF.filter(e=>{const d=etapesData[e.id]||{};return tempsPondere(d.scenarios||[])>0;}).sort((a,b)=>tempsPondere((etapesData[b.id]||{}).scenarios||[])-tempsPondere((etapesData[a.id]||{}).scenarios||[])).slice(0,2);
                  const angleNext360 = dominant?.id==="cout_cache"?"Les coûts cachés identifiés représentent un potentiel d'optimisation direct via la centralisation NEXT360."
                    :dominant?.id==="fragmentation"?"La fragmentation détectée entre étapes est exactement ce que NEXT360 adresse par la centralisation des flux."

                    :dominant?.id==="conformite"?"Les risques conformité identifiés appellent une traçabilité native — c'est le cœur de la valeur NEXT360."
                    :dominant?.id==="automatisation"?"Les opportunités d'automatisation repérées sont directement adressables par les modules NEXT360."
                    :"La consolidation du processus sur NEXT360 permettrait de réduire la charge opérationnelle et d'améliorer la traçabilité.";

                  return (
                    <div style={{padding:"16px 20px",background:`linear-gradient(135deg,${C.blackMid},${C.blackSurf})`,border:`1px solid ${C.cyanBorder}`,borderRadius:"10px",marginBottom:"14px"}}>
                      <div style={{fontSize:"9px",fontWeight:700,color:C.cyan,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"10px",fontFamily:"'Barlow Condensed',sans-serif"}}>Diagnostic — Situation client</div>
                      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                        {/* Bloc situation */}
                        {calc.etpTotal>0&&<p style={{fontSize:"13px",color:C.white,lineHeight:1.7,margin:0}}>

                          {calc.tauxC>0&&<> Le taux de charge est de <strong style={{color:calc.tauxC>90?C.red:calc.tauxC>70?C.amber:C.green}}>{calc.tauxC.toFixed(0)}%</strong>{calc.tauxC>90?" — situation de surcharge identifiée.":calc.tauxC>70?" — capacité sous tension.":"."}</>}
                        </p>}
                        {/* Bloc friction */}
                        {etapesChargees.length>0&&<p style={{fontSize:"13px",color:C.whiteMid,lineHeight:1.7,margin:0}}>
                          Les étapes les plus chronophages sont <strong style={{color:C.white}}>{etapesChargees.map(e=>e.label).join(" et ")}</strong>{tagCounts.length>0&&<>, concentrant les signaux de <strong style={{color:tagCounts[0].color}}>{tagCounts.map(t=>`${t.icon} ${t.label}`).join(", ")}</strong></>}.
                        </p>}
                        {/* Angle NEXT360 */}
                        {dominant&&<div style={{marginTop:"4px",paddingTop:"10px",borderTop:`1px solid ${C.blackBorder}`}}>
                          <span style={{fontSize:"9px",fontWeight:700,color:C.cyan,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'Barlow Condensed',sans-serif"}}>Angle NEXT360 · </span>
                          <span style={{fontSize:"13px",color:C.white,lineHeight:1.7}}>{angleNext360}</span>
                        </div>}
                      </div>
                    </div>
                  );
                })()}

                {/* SCORE MATURITÉ */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"14px"}}>
                  {maturity.scores.map((s,i)=>(
                    <div key={i} style={{padding:"10px 12px",background:C.blackSurf,borderRadius:"8px",border:`1px solid ${SIGNAL_COLORS[s]}40`,display:"flex",alignItems:"center",gap:"8px"}}>
                      <div style={{width:"10px",height:"10px",borderRadius:"50%",background:SIGNAL_COLORS[s],flexShrink:0}}/>
                      <div>
                        <div style={{fontSize:"9px",color:SIGNAL_COLORS[s],fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:"'Barlow Condensed',sans-serif"}}>{s==="green"?"✓ OK":s==="orange"?"⚠ Partiel":"✗ Absent"}</div>
                        <div style={{fontSize:"10px",color:C.whiteMid,marginTop:"1px"}}>{MATURITY_LABELS[i]}</div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* KPIs */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"10px",marginBottom:"14px"}}>
                  {[["ETP mobilisés",calc.etpTotal,C.cyan],["Coût RH / mois",fmtEuro(calc.coutRH),C.blueLight],["Budget outils / mois",fmtEuro(calc.coutOutils),C.blue],["Coût total / mois",fmtEuro(calc.coutTotal),C.cyan],["Coût / dossier",fmtEuro(calc.coutPD),C.amber]].map(([l,v,c])=>(
                    <div key={l} style={{padding:"14px",background:C.blackSurf,borderRadius:"8px",border:`1px solid ${C.blackBorder}`,textAlign:"center",position:"relative",overflow:"hidden"}}>
                      <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:c}}/>
                      <div style={{fontSize:"9px",color:C.whiteMid,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"5px"}}>{l}</div>
                      <div style={{fontSize:"19px",fontWeight:800,fontFamily:"'DM Mono',monospace",color:c}}>{v}</div>
                    </div>
                  ))}
                </div>

                {/* Funnel + Charge */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"14px"}}>
                  <div style={{padding:"16px",background:C.blackSurf,borderRadius:"8px",border:`1px solid ${C.blackBorder}`}}>
                    <div style={{fontSize:"10px",fontWeight:700,color:C.whiteMid,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"12px"}}>Funnel de transformation</div>
                    {[["Demandes",fmtN(volD),"100%",C.cyan],["Devis émis",fmtN(volDv),`${txDD}%`,C.blueLight],["Commandes",fmtN(volC),`${txDC}%`,C.green]].map(([l,v,p,c])=>(
                      <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                        <span style={{fontSize:"12px",color:C.whiteMid}}>{l}</span>
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                          <span style={{fontSize:"15px",fontWeight:800,fontFamily:"'DM Mono',monospace",color:c}}>{v}</span>
                          <Tag color={c} size={9}>{p}</Tag>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{padding:"16px",background:C.blackSurf,borderRadius:"8px",border:`1px solid ${C.blackBorder}`}}>
                    <div style={{fontSize:"10px",fontWeight:700,color:C.whiteMid,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"12px"}}>Charge & capacité</div>
                    {[["Charge mensuelle",fmtH(calc.chargeH),C.cyan],["Capacité effective",fmtH(calc.capH),C.whiteMid]].map(([l,v,c])=>(
                      <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
                        <span style={{fontSize:"12px",color:C.whiteMid}}>{l}</span>
                        <span style={{fontSize:"14px",fontWeight:700,fontFamily:"'DM Mono',monospace",color:c}}>{v}</span>
                      </div>
                    ))}
                    <div style={{height:"10px",background:C.blackBorder,borderRadius:"5px",overflow:"hidden",marginTop:"10px"}}>
                      <div style={{height:"100%",width:`${Math.min(100,calc.tauxC)}%`,background:calc.tauxC>90?C.red:calc.tauxC>70?C.amber:C.green,borderRadius:"5px"}}/>
                    </div>
                    <div style={{textAlign:"right",fontSize:"11px",color:C.whiteMid,marginTop:"4px"}}>Taux de charge : <strong style={{color:calc.tauxC>90?C.red:calc.tauxC>70?C.amber:C.green}}>{calc.tauxC.toFixed(0)}%</strong></div>
                  </div>
                </div>

                {/* Points bloquants */}
                {Object.entries(etapesData).some(([,d])=>d.note?.includes("!"))&&(
                  <div style={{padding:"14px 16px",background:C.amberDim,border:`1px solid ${C.amber}50`,borderRadius:"8px",marginBottom:"14px"}}>
                    <div style={{fontSize:"10px",fontWeight:700,color:C.amber,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"10px"}}>Points bloquants identifiés</div>
                    {ETAPES_DEF.map(e=>{const d=etapesData[e.id];if(!d?.note?.includes("!"))return null;return(<div key={e.id} style={{fontSize:"12px",color:C.white,marginBottom:"5px"}}><strong style={{color:e.color}}>{e.label}</strong> — {d.note}</div>);})}
                  </div>
                )}

                {/* Notes */}
                {(notes.general||notes.postrdv)&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"14px"}}>
                    {[["Notes de réunion","general"],["Actions post-RDV","postrdv"]].map(([lbl,key])=>notes[key]&&(
                      <div key={key} style={{padding:"14px",background:C.blackSurf,borderRadius:"8px",border:`1px solid ${C.blackBorder}`}}>
                        <div style={{fontSize:"10px",fontWeight:700,color:C.whiteMid,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}}>{lbl}</div>
                        <p style={{fontSize:"12px",color:C.whiteMid,lineHeight:1.6}}>{notes[key]}</p>
                      </div>
                    ))}
                  </div>
                )}

                {/* Signaux commerciaux consolidés + Placeholder NEXT360 */}
                {(()=>{
                  const allTagsFlat = ETAPES_DEF.flatMap(e=>{
                    const d=etapesData[e.id]||{};
                    return (d.signalTags||[]).map(tid=>({tid,etape:e}));
                  });
                  const byTag = SIGNAL_TAGS.map(t=>({...t,etapes:allTagsFlat.filter(x=>x.tid===t.id).map(x=>x.etape)})).filter(t=>t.etapes.length>0);
                  return byTag.length>0?(
                    <div style={{padding:"12px 16px",background:C.blackSurf,borderRadius:"8px",border:`1px solid ${C.blackBorder}`,marginBottom:"14px"}}>
                      <div style={{fontSize:"9px",fontWeight:700,color:C.whiteMid,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}}>Signaux identifiés en RDV</div>
                      <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                        {byTag.map(t=>(
                          <div key={t.id} style={{display:"flex",alignItems:"center",gap:"8px"}}>
                            <span style={{fontSize:"11px",fontWeight:700,color:t.color,minWidth:"140px",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.03em"}}>{t.icon} {t.label}</span>
                            <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
                              {t.etapes.map(e=><Tag key={e.id} color={e.color}>{e.shortLabel}</Tag>)}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ):null;
                })()}
                <div style={{padding:"16px 20px",border:`1px dashed ${C.cyanBorder}`,borderRadius:"8px",textAlign:"center",background:C.cyanDim}}>
                  <div style={{fontSize:"14px",fontWeight:800,color:C.cyan,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.06em"}}>PROJECTION NEXT360 · À compléter avec les métriques SMLB</div>
                  <div style={{fontSize:"11px",color:C.whiteMid,marginTop:"3px"}}>Comparaison situation actuelle vs NEXT360 — calcul des économies envisageables et ROI d'adoption</div>
                </div>
              </div>{/* fin dashboard visuel */}

              {/* Notes dans l'interface */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginTop:"16px"}}>
                {[["Notes de réunion","general","Observations, enjeux exprimés, signaux identifiés…"],["Actions post-RDV","postrdv","Prochaines étapes, décideurs, angle NEXT360 à valoriser…"]].map(([lbl,key,ph])=>(
                  <Card key={key}>
                    <Lbl>{lbl}</Lbl>
                    <textarea value={notes[key]} onChange={e=>setNotes(n=>({...n,[key]:e.target.value}))} placeholder={ph} rows={5}
                      style={{width:"100%",padding:"10px 12px",border:`1px solid ${C.blackBorder}`,borderRadius:"7px",fontSize:"13px",color:C.white,background:C.blackSurf,lineHeight:1.6,resize:"vertical"}}/>
                  </Card>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ConsoleV4));
  </script>
</body>
</html>
